name: AI Dispatch

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC，预留 GitHub 延迟缓冲，目标到达时间 BST 07:00
  workflow_dispatch:        # 允许手动触发测试

permissions:
  contents: write           # 允许 Action 把 sent_history.json commit 回仓库

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and send AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_news.py

      - name: Commit updated sent history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git diff --staged --quiet || git commit -m "chore: update sent history [skip ci]"
          git push
